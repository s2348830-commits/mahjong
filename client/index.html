<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Online Mahjong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="portrait-warning">
        <div><p style="font-size: 3rem; margin: 0;">📱🔄</p><p>スマホを横向きにしてください</p></div>
    </div>

    <div id="loading-screen" style="display:none;">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>画像を読み込んでいます...</p>
        </div>
    </div>

    <div id="app">
        <div id="home-screen" class="screen">
            <h1>オンライン麻雀ロビー</h1>
            <button onclick="createRoom()">部屋を作成</button>
            <button onclick="searchRooms()">部屋を検索</button>
            <ul id="room-list"></ul>
        </div>

        <div id="room-screen" class="screen" style="display:none;">
            <h2>部屋待機室: <span id="room-name-display"></span></h2>
            <div id="room-settings" class="settings-panel">
                <h3>ゲーム設定 <span id="guest-badge" style="display:none; color:#f1c40f; font-size:0.9rem;">(ゲスト)</span></h3>
                <fieldset id="settings-fieldset" style="border:none; padding:0; margin:0;">
                    
                    <div style="margin-bottom: 10px;" class="setting-button-group">
                        <span class="setting-label">人数:</span>
                        <button type="button" class="hex-button selected" onclick="changeSettingRadio('mode', 4)">4人</button>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('mode', 3)">3人</button>
                        <input type="hidden" name="mode" value="4">
                    </div>

                    <div style="margin-bottom: 10px;" class="setting-button-group">
                        <span class="setting-label">長さ:</span>
                        <button type="button" class="hex-button selected" onclick="changeSettingRadio('length', 'east')">東風戦</button>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('length', 'south')">半荘戦</button>
                        <input type="hidden" name="length" value="east">
                    </div>

                    <div style="margin-bottom: 10px;" class="setting-button-group">
                        <span class="setting-label">持ち時間:</span>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('thinkTime', '3+5')">早い (3+5秒)</button>
                        <button type="button" class="hex-button selected" onclick="changeSettingRadio('thinkTime', '5+10')">普通 (5+10秒)</button>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('thinkTime', '60')">ゆっくり (60秒)</button>
                        <input type="hidden" name="thinkTime" value="5+10">
                    </div>

                    <div style="margin-bottom: 10px;" class="setting-button-group">
                        <span class="setting-label">CPUレベル:</span>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('cpuLevel', 'easy')">弱い</button>
                        <button type="button" class="hex-button selected" onclick="changeSettingRadio('cpuLevel', 'normal')">普通</button>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('cpuLevel', 'hard')">強い</button>
                        <input type="hidden" name="cpuLevel" value="normal">
                    </div>

                    <div style="margin-bottom: 10px;" class="setting-button-group">
                        <span class="setting-label">詳細設定:</span>
                        <button type="button" class="hex-button" onclick="changeSettingRadio('advanced', true)">開く</button>
                        <button type="button" class="hex-button selected" onclick="changeSettingRadio('advanced', false)">閉じる</button>
                        <input type="hidden" name="advanced" value="false">
                    </div>

                    <div id="advanced-settings" style="display:none; background:rgba(255,255,255,0.1); padding:10px; border-radius:5px; margin-top:10px;">
                        <div style="margin-bottom: 10px;">
                            <span class="setting-label">開始点数:</span>
                            <input type="number" id="startPoints" value="25000" step="1000" style="width:80px; padding:5px;" onchange="syncSettings()">
                        </div>
                        <div style="margin-bottom: 10px;">
                            <span class="setting-label">返し点数:</span>
                            <input type="number" id="targetPoints" value="30000" step="1000" style="width:80px; padding:5px;" onchange="syncSettings()">
                        </div>
                        <div style="margin-bottom: 10px;" class="setting-button-group">
                            <span class="setting-label">トビ終了:</span>
                            <button type="button" class="hex-button selected" onclick="changeSettingRadio('tobi', true)">あり</button>
                            <button type="button" class="hex-button" onclick="changeSettingRadio('tobi', false)">なし</button>
                            <input type="hidden" name="tobi" value="true">
                        </div>
                        <div style="margin-bottom: 10px;" class="setting-button-group">
                            <span class="setting-label">喰いタン:</span>
                            <button type="button" class="hex-button selected" onclick="changeSettingRadio('kuitan', true)">あり</button>
                            <button type="button" class="hex-button" onclick="changeSettingRadio('kuitan', false)">なし</button>
                            <input type="hidden" name="kuitan" value="true">
                        </div>
                        <div style="margin-bottom: 10px;" class="setting-button-group">
                            <span class="setting-label">赤ドラ:</span>
                            <button type="button" class="hex-button" onclick="changeSettingRadio('akaDora', 0)">0枚</button>
                            <button type="button" class="hex-button selected" onclick="changeSettingRadio('akaDora', 3)">3枚</button>
                            <button type="button" class="hex-button" onclick="changeSettingRadio('akaDora', 4)">4枚</button>
                            <input type="hidden" name="akaDora" value="3">
                        </div>
                        <div style="margin-bottom: 10px;" class="setting-button-group">
                            <span class="setting-label">ローカル役:</span>
                            <button type="button" class="hex-button" onclick="changeSettingRadio('localYaku', true)">あり</button>
                            <button type="button" class="hex-button selected" onclick="changeSettingRadio('localYaku', false)">なし</button>
                            <input type="hidden" name="localYaku" value="false">
                        </div>
                        <div style="margin-bottom: 10px;" class="setting-button-group">
                            <span class="setting-label">手牌公開:</span>
                            <button type="button" class="hex-button" onclick="changeSettingRadio('openHands', true)">全員公開</button>
                            <button type="button" class="hex-button selected" onclick="changeSettingRadio('openHands', false)">通常</button>
                            <input type="hidden" name="openHands" value="false">
                        </div>
                    </div>
                </fieldset>
            </div>
            
            <ul id="player-list"></ul>
            <div id="host-only-buttons" style="display:none; margin-top: 15px;">
                <button onclick="addBot()" style="background:#3498db;">Botを追加</button>
            </div>
            <button onclick="toggleReady()" style="margin-top: 15px; font-size: 1.2rem; padding: 10px 30px;">準備完了 / 開始</button>
        </div>

        <div id="game-screen" class="screen" style="display:none; padding: 0;">
            <div id="action-timer-display"></div>
            
            <div id="action-ui-area">
                <div id="action-buttons">
                    <button id="btn-ron" class="action-btn btn-ron" style="display:none;" onclick="sendGameAction('RON')"></button>
                    <button id="btn-tsumo" class="action-btn btn-tsumo" style="display:none;" onclick="sendGameAction('TSUMO')"></button>
                    <button id="btn-pon" class="action-btn btn-pon" style="display:none;" onclick="sendGameAction('PON')"></button>
                    <button id="btn-chi" class="action-btn btn-chi" style="display:none;" onclick="sendGameAction('CHI')"></button>
                    <button id="btn-kan" class="action-btn btn-kan" style="display:none;" onclick="sendGameAction('KAN')"></button>
                    <button id="btn-riichi" class="action-btn btn-riichi" style="display:none;" onclick="sendGameAction('RIICHI')"></button>
                    <button id="btn-kita" class="action-btn btn-kita" style="display:none;" onclick="sendGameAction('KITA')"></button>
                    <button id="btn-pass" class="action-btn btn-pass" style="display:none;" onclick="sendGameAction('PASS')"></button>
                    <button id="btn-kyuushu" class="action-btn btn-ryuukyoku" style="display:none;" onclick="sendGameAction('KYUUSHU')"></button>
                </div>
            </div>

            <div id="reach-modal" style="display:none; position:absolute; top:40%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.9); padding:20px; border-radius:10px; z-index:300; flex-direction:column; align-items:center;">
                <h2 style="color:#f1c40f; margin-top:0;">捨てる牌を選んでください</h2>
                <div id="reach-hand" class="hand"></div>
                <button onclick="sendGameAction('CANCEL_REACH')" style="margin-top:15px; background:#e74c3c;">キャンセル</button>
            </div>

            <div id="chi-modal" style="display:none; position:absolute; top:40%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.9); padding:20px; border-radius:10px; z-index:300; flex-direction:column; align-items:center;">
                <h2 style="color:#f1c40f; margin-top:0;">チーする組み合わせを選んでください</h2>
                <div id="chi-options" style="display:flex; gap:15px;"></div>
                <button onclick="document.getElementById('chi-modal').style.display='none'" style="margin-top:15px; background:#e74c3c;">キャンセル</button>
            </div>

            <div id="kan-modal" style="display:none; position:absolute; top:40%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.9); padding:20px; border-radius:10px; z-index:300; flex-direction:column; align-items:center;">
                <h2 style="color:#f1c40f; margin-top:0;">カンする牌を選んでください</h2>
                <div id="kan-options" style="display:flex; gap:15px;"></div>
                <button onclick="document.getElementById('kan-modal').style.display='none'" style="margin-top:15px; background:#e74c3c;">キャンセル</button>
            </div>

            <div id="winning-tiles-container" style="display:none; position:absolute; top:65%; left:50%; transform:translate(-50%, 0); background:rgba(0,0,0,0.8); padding:10px 20px; border-radius:8px; z-index:40; text-align:center;">
                <div style="color:#f1c40f; font-weight:bold; margin-bottom:5px;">待ち牌</div>
                <div id="winning-tiles-list" style="display:flex; gap:5px; justify-content:center;"></div>
            </div>

            <div id="result-overlay" style="display:none;">
                <div id="result-text"></div>
            </div>
            
            <div id="final-result-overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:500; align-items:center; justify-content:center; flex-direction:column;">
                <h1 style="color:#f1c40f; font-size:3rem; margin-bottom:10px;">ゲーム終了</h1>
                <h2 id="final-result-reason" style="color:#fff; margin-bottom:30px;"></h2>
                <div id="final-result-ranking" style="background:rgba(255,255,255,0.1); padding:20px; border-radius:10px; width:300px;"></div>
                <button onclick="window.location.reload()" style="margin-top:30px; font-size:1.2rem;">ロビーへ戻る</button>
            </div>

            <div id="mahjong-table">
                <div id="round-info"></div>
                <div id="dora-area">
                    <div style="color:#f1c40f; font-weight:bold;">ドラ</div>
                    <div id="dora-indicators"></div>
                </div>

                <div id="score-top" class="player-score" style="display:none;"></div>
                <div id="score-left" class="player-score" style="display:none;"></div>
                <div id="score-right" class="player-score" style="display:none;"></div>
                <div id="score-bottom" class="player-score" style="display:none;"></div>

                <div id="area-top" class="player-area top" style="display:none;">
                    <div id="name-top" class="player-name-label" style="display:none;"></div>
                    <div id="hand-top" class="hand"></div>
                    <div id="meld-top" class="hand" style="margin-left: 20px;"></div>
                </div>
                <div id="area-left" class="player-area left" style="display:none;">
                    <div id="name-left" class="player-name-label" style="display:none;"></div>
                    <div id="hand-left" class="hand"></div>
                    <div id="meld-left" class="hand" style="margin-left: 20px;"></div>
                </div>
                <div id="area-right" class="player-area right" style="display:none;">
                    <div id="name-right" class="player-name-label" style="display:none;"></div>
                    <div id="hand-right" class="hand"></div>
                    <div id="meld-right" class="hand" style="margin-left: 20px;"></div>
                </div>
                <div id="area-bottom" class="player-area bottom">
                    <div id="name-bottom" class="player-name-label" style="display:none;"></div>
                    <div id="hand-bottom" class="hand"></div>
                    <div id="meld-bottom" class="hand" style="margin-left: 20px;"></div>
                </div>

                <div id="center-discards">
                    <div id="discard-top" class="discard-area top" style="display:none;"></div>
                    <div id="discard-left" class="discard-area left" style="display:none;"></div>
                    <div id="discard-right" class="discard-area right" style="display:none;"></div>
                    <div id="discard-bottom" class="discard-area bottom"></div>
                </div>

            </div>
        </div>
    </div>

    <script>
    function selectSettingBtn(btn) {
        const group = btn.closest('.setting-button-group');
        if (group) {
            group.querySelectorAll('.hex-button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    }
    </script>
    <script src="app.js"></script>
</body>
</html>
