<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Online Mahjong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home-screen" class="screen">
            <h1>オンライン麻雀ロビー</h1>
            <button onclick="createRoom()">部屋を作成 (4人)</button>
            <button onclick="searchRooms()">部屋を検索</button>
            <ul id="room-list"></ul>
        </div>

        <div id="room-screen" class="screen" style="display:none;">
            <h2>部屋待機室: <span id="room-name-display"></span></h2>
            
            <div id="room-settings" class="settings-panel">
                <h3>ゲーム設定</h3>
                
                <div id="host-controls" style="display: none;">
                    <label>
                        <input type="radio" name="player-count" value="4" onchange="changeRule(4)"> 4人麻雀 (4麻)
                    </label>
                    <label>
                        <input type="radio" name="player-count" value="3" onchange="changeRule(3)"> 3人麻雀 (3麻)
                    </label>
                    <div style="margin-top: 15px;">
                        <button id="add-bot-btn" onclick="addBot()" style="background: #27ae60;">+ Botを追加</button>
                    </div>
                </div>
                
                <div id="guest-view" style="display: none;">
                    ルール: <span id="current-rule-display" class="highlight-text">4人麻雀</span>
                </div>
            </div>

            <ul id="player-list"></ul>
            <button onclick="toggleReady()">準備完了 / 取消</button>
        </div>

        <div id="game-screen" class="screen" style="display:none;">
            <h2>対局中</h2>
            <div id="game-info"></div>
            <div id="table">
                <div id="discards"></div>
            </div>
            <div id="my-hand" class="hand"></div>
            <div id="actions">
                </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
