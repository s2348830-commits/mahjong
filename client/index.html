<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Online Mahjong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="home-screen" class="screen">
            <h1>オンライン麻雀ロビー</h1>
            <button onclick="createRoom()">部屋を作成 (4人)</button>
            <button onclick="searchRooms()">部屋を検索</button>
            <ul id="room-list"></ul>
        </div>

        <div id="room-screen" class="screen" style="display:none;">
            <h2>部屋待機室: <span id="room-name-display"></span></h2>
            
            <div id="room-settings" class="settings-panel">
                <h3>ゲーム設定</h3>
                
                <div id="host-controls" style="display: none;">
                    <form id="settings-form" onchange="syncSettings()">
                        <div class="setting-group">
                            <label class="setting-label">モード</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('mode', 4)">四人麻雀</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('mode', 3)">三人麻雀</button>
                                <input type="hidden" name="mode" value="4">
                            </div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">局数</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('length', 'one')">一局戦</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('length', 'east')">東風戦</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('length', 'south')">半荘戦</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('length', 'cpu')">CPU戦</button>
                                <input type="hidden" name="length" value="east">
                            </div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">思考時間</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('thinkTime', '3+5')">3+5秒</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('thinkTime', '5+10')">5+10秒</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('thinkTime', '5+20')">5+20秒</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('thinkTime', '60+0')">60+0秒</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('thinkTime', '300+0')">300+0秒</button>
                                <input type="hidden" name="thinkTime" value="5+10">
                            </div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">詳細設定</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('advanced', false)">無効</button>
                                <button type="button" class="hex-button unselected" onclick="changeSettingRadio('advanced', true)">有効</button>
                                <input type="hidden" name="advanced" value="false">
                            </div>
                        </div>

                        <div id="advanced-settings" style="display: none;">
                            <hr class="settings-divider">
                            <div class="setting-group">
                                <label class="setting-label">配給原点</label>
                                <input type="number" id="startPoints" value="25000" step="100" class="num-input">
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">1位必要点数</label>
                                <input type="number" id="targetPoints" value="30000" step="100" class="num-input">
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">飛び</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('tobi', false)">無効</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('tobi', true)">有効</button>
                                    <input type="hidden" name="tobi" value="true">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">ローカル役</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('localYaku', false)">無効</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('localYaku', true)">有効</button>
                                    <input type="hidden" name="localYaku" value="false">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">赤ドラ</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('akaDora', 0)">赤無し</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('akaDora', 3)">赤ドラ3</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('akaDora', 4)">赤ドラ4</button>
                                    <input type="hidden" name="akaDora" value="3">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">食い断</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('kuitan', false)">無効</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('kuitan', true)">有効</button>
                                    <input type="hidden" name="kuitan" value="true">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">CPU</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('cpuLevel', 'easy')">簡単</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('cpuLevel', 'normal')">普通</button>
                                    <input type="hidden" name="cpuLevel" value="normal">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">手牌表示</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('openHands', false)">無効</button>
                                    <button type="button" class="hex-button unselected" onclick="changeSettingRadio('openHands', true)">有効</button>
                                    <input type="hidden" name="openHands" value="false">
                                </div>
                            </div>
                        </div>
                    </form>
                    
                    <div style="margin-top: 15px;">
                        <button id="add-bot-btn" onclick="addBot()" style="background: #27ae60;">+ Botを追加</button>
                    </div>
                </div>
                
                <div id="guest-view" style="display: none;">
                    <table id="guest-settings-table" class="guest-table"></table>
                </div>
            </div> <ul id="player-list"></ul>
            <button onclick="toggleReady()">準備完了 / 取消</button>
        </div> <div id="game-screen" class="screen" style="display:none;">
            <h2>対局中</h2>
            <div id="game-info"></div>
            <div id="table">
                <div id="discards"></div>
            </div>
            <div id="my-hand" class="hand"></div>
            <div id="actions"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
