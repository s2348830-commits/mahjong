<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Online Mahjong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="portrait-warning">
        <div><p style="font-size: 3rem; margin: 0;">📱🔄</p><p>スマホを横向きにしてください</p></div>
    </div>

    <div id="loading-screen" style="display:none;">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>画像を読み込んでいます...</p>
        </div>
    </div>

    <div id="app">
        <div id="home-screen" class="screen">
            <h1>オンライン麻雀ロビー</h1>
            <button onclick="createRoom()">部屋を作成 (4人)</button>
            <button onclick="searchRooms()">部屋を検索</button>
            <ul id="room-list"></ul>
        </div>

        <div id="room-screen" class="screen" style="display:none;">
            <h2>部屋待機室: <span id="room-name-display"></span></h2>
            <div id="room-settings" class="settings-panel">
                <h3>ゲーム設定 <span id="guest-badge" style="display:none; color:#f39c12; font-size:0.9rem;">(ゲスト: 確認のみ)</span></h3>
                <fieldset id="settings-fieldset" style="border:none; padding:0; margin:0;">
                    <form id="settings-form" onchange="syncSettings()">
                        <div class="setting-group">
                            <label class="setting-label">モード</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button" onclick="changeSettingRadio('mode', 4)">四人麻雀</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('mode', 3)">三人麻雀</button>
                                <input type="hidden" name="mode" value="4">
                            </div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">局数</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button" onclick="changeSettingRadio('length', 'one')">一局戦</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('length', 'east')">東風戦</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('length', 'south')">半荘戦</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('length', 'cpu')">CPU戦</button>
                                <input type="hidden" name="length" value="east">
                            </div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">思考時間</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button" onclick="changeSettingRadio('thinkTime', '3+5')">3+5秒</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('thinkTime', '5+10')">5+10秒</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('thinkTime', '5+20')">5+20秒</button>
                                <input type="hidden" name="thinkTime" value="5+10">
                            </div>
                        </div>
                        <div class="setting-group">
                            <label class="setting-label">詳細設定</label>
                            <div class="setting-button-group">
                                <button type="button" class="hex-button" onclick="changeSettingRadio('advanced', false)">無効</button>
                                <button type="button" class="hex-button" onclick="changeSettingRadio('advanced', true)">有効</button>
                                <input type="hidden" name="advanced" value="false">
                            </div>
                        </div>
                        <div id="advanced-settings" style="display: none;">
                            <hr class="settings-divider">
                            <div class="setting-group"><label class="setting-label">配給原点</label><input type="number" id="startPoints" value="25000" class="num-input"></div>
                            <div class="setting-group"><label class="setting-label">1位必要点数</label><input type="number" id="targetPoints" value="30000" class="num-input"></div>
                            <div class="setting-group">
                                <label class="setting-label">飛び</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('tobi', false)">無効</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('tobi', true)">有効</button>
                                    <input type="hidden" name="tobi" value="true">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">ローカル役</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('localYaku', false)">無効</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('localYaku', true)">有効</button>
                                    <input type="hidden" name="localYaku" value="false">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">赤ドラ</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('akaDora', 0)">赤無し</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('akaDora', 3)">赤ドラ3</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('akaDora', 4)">赤ドラ4</button>
                                    <input type="hidden" name="akaDora" value="3">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">食い断</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('kuitan', false)">無効</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('kuitan', true)">有効</button>
                                    <input type="hidden" name="kuitan" value="true">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">CPU</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('cpuLevel', 'easy')">簡単</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('cpuLevel', 'normal')">普通</button>
                                    <input type="hidden" name="cpuLevel" value="normal">
                                </div>
                            </div>
                            <div class="setting-group">
                                <label class="setting-label">手牌表示</label>
                                <div class="setting-button-group">
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('openHands', false)">無効</button>
                                    <button type="button" class="hex-button" onclick="changeSettingRadio('openHands', true)">有効</button>
                                    <input type="hidden" name="openHands" value="false">
                                </div>
                            </div>
                        </div>
                    </form>
                </fieldset>
                <div id="host-only-buttons" style="margin-top: 15px;">
                    <button id="add-bot-btn" onclick="addBot()" style="background: #27ae60;">+ Botを追加</button>
                </div>
            </div>
            <ul id="player-list"></ul>
            <button onclick="toggleReady()" style="font-size: 1.2rem; background: #e67e22; padding: 12px 30px;">準備完了 / 取消</button>
        </div>

        <div id="game-screen" class="screen" style="display:none; padding: 0;">
            
            <div id="winning-tiles-container" style="display:none; position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.7); padding:10px 15px; border-radius:8px; border:1px solid #f1c40f; z-index:150;">
                <div style="font-size:0.9rem; font-weight:bold; margin-bottom:8px; color:#f1c40f; text-align:center;">待ち牌</div>
                <div id="winning-tiles-list" class="hand" style="gap:2px;"></div>
            </div>

            <div id="reach-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:300; justify-content:center; align-items:center;">
                <div style="background:#1e4b30; padding:20px; border-radius:10px; border:2px solid #f1c40f; text-align:center;">
                    <h3 style="color:#fff; margin-top:0;">リーチする牌を選んでください</h3>
                    <div id="reach-hand" class="hand" style="margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px;"></div>
                    <button onclick="document.getElementById('reach-modal').style.display='none';" style="background:#e74c3c;">キャンセル</button>
                </div>
            </div>

            <div id="game-info"></div>

            <div id="result-overlay" style="display:none;">
                <h2 id="result-text"></h2>
            </div>

            <div id="mahjong-table" onclick="deselectTile(event)">
                
                <div id="action-buttons" style="display:none;">
                    <button id="btn-tsumo" onclick="sendGameAction('TSUMO')" style="display:none;">ツモ</button>
                    <button id="btn-ron" onclick="sendGameAction('RON')" style="display:none;">ロン</button>
                    <button id="btn-pon" onclick="sendGameAction('PON')" style="display:none; background: #3498db;">ポン</button>
                    <button id="btn-kan" onclick="sendGameAction('KAN')" style="display:none; background: #8e44ad;">カン</button>
                    <button id="btn-riichi" onclick="sendGameAction('RIICHI')" style="display:none; background: #e74c3c;">リーチ</button>
                    <button id="btn-pass" onclick="sendGameAction('PASS')" style="display:none;">パス</button>
                </div>

                <div id="area-top" class="player-area top" style="display:none;">
                    <div class="player-name" id="name-top"></div>
                    <div id="hand-top" class="hand"></div>
                    <div id="meld-top" class="hand" style="margin-left: 20px;"></div>
                </div>
                <div id="area-left" class="player-area left" style="display:none;">
                    <div class="player-name" id="name-left"></div>
                    <div id="hand-left" class="hand"></div>
                    <div id="meld-left" class="hand" style="margin-top: 20px;"></div>
                </div>
                <div id="area-right" class="player-area right" style="display:none;">
                    <div class="player-name" id="name-right"></div>
                    <div id="hand-right" class="hand"></div>
                    <div id="meld-right" class="hand" style="margin-top: 20px;"></div>
                </div>
                <div id="area-bottom" class="player-area bottom">
                    <div class="player-name" id="name-bottom" style="display: none; position:absolute; top:-30px;"></div>
                    <div id="hand-bottom" class="hand"></div>
                    <div id="meld-bottom" class="hand" style="margin-left: 20px;"></div>
                </div>

                <div id="center-discards">
                    <div id="discard-top" class="discard-area top" style="display:none;"></div>
                    <div id="discard-left" class="discard-area left" style="display:none;"></div>
                    <div id="discard-right" class="discard-area right" style="display:none;"></div>
                    <div id="discard-bottom" class="discard-area bottom"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="https://unpkg.com/@discord/embedded-app-sdk"></script>
</body>
</html>
